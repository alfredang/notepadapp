name: NotePadApp
options:
  bundleIdPrefix: com.tertiaryinfotech
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    CODE_SIGN_STYLE: Automatic

targets:
  NotePadApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Services
      - path: PencilKit
      - path: Components
      - path: Views
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.notepadapp
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: ""
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        MARKETING_VERSION: "1.5"
        UISupportedInterfaceOrientations: ""
      configs:
        # Debug uses development APNs (CloudKit Development); Release/archive uses
        # production APNs (CloudKit Production) for App Store / TestFlight.
        Debug:
          CODE_SIGN_ENTITLEMENTS: App/NotePadApp.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: App/NotePadApp.Release.entitlements
    scheme:
      testTargets: []

schemes:
  NotePadApp:
    build:
      targets:
        NotePadApp: all
    run:
      config: Debug
